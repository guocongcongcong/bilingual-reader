<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} · Bilingual Reader</title>
<style>
:root{--bg:#fff;--text:#1a1a2e;--text2:#52525b;--accent:#4f46e5;--border:#e5e5e7;--hl:rgba(79,70,229,.06)}
body.dark{--bg:#0f0f13;--text:#e4e4ec;--text2:#9898a8;--accent:#818cf8;--border:#2a2a35;--hl:rgba(129,140,248,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{max-width:1040px;margin:0 auto;padding:40px 24px;font-family:-apple-system,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.toolbar{display:flex;gap:8px;margin:0 0 12px;flex-wrap:wrap}
.toolbar button,.toolbar a{padding:6px 16px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--accent);cursor:pointer;font-size:.8rem;font-family:inherit;text-decoration:none;display:inline-block}
.toolbar button:hover,.toolbar a:hover{background:var(--hl)}

h1{font-size:1.5rem;margin-bottom:6px}
.author{color:var(--text2);font-size:.875rem;margin-bottom:40px}

.section-header{text-align:center;font-weight:600;color:var(--accent);font-size:1rem;margin:48px 0 20px;padding-top:48px;border-top:1px solid var(--border)}
.section-header:first-of-type{border-top:none;margin-top:0;padding-top:0}

.pair{display:flex;gap:32px;padding:10px 16px;margin:0 -16px;border-radius:6px;cursor:pointer;border-left:2px solid transparent;transition:background .15s,border-color .15s}
.pair:hover{background:var(--hl)}
.pair.active{background:var(--hl);border-left-color:var(--accent)}
.pair+.pair{border-top:1px solid var(--border)}
.pair.mismatch{border-left-color:#e5484d}

.col-en,.col-zh{flex:0 0 50%;min-width:0;line-height:1.7;color:var(--text2)}
.pair.active .col-en,.pair.active .col-zh{color:var(--text)}

.col-en strong,.col-zh strong{color:var(--text)}
.col-en em,.col-zh em{font-style:italic}
.col-en code,.col-zh code{font-size:.875em;background:var(--hl);padding:2px 6px;border-radius:3px;font-family:'SF Mono','Fira Code',monospace}
.col-en pre,.col-zh pre{background:var(--hl);padding:12px 16px;border-radius:6px;overflow-x:auto;font-size:.8125rem;margin:8px 0}
.col-en pre code,.col-zh pre code{background:none;padding:0;border-radius:0}
.col-en blockquote,.col-zh blockquote{border-left:2px solid var(--accent);padding-left:12px;margin:8px 0;opacity:.8}
.col-en ul,.col-zh ul,.col-en ol,.col-zh ol{padding-left:20px;margin:6px 0}
.col-en a,.col-zh a{color:var(--accent)}
.col-en img,.col-zh img{max-width:100%}
.col-en table,.col-zh table{border-collapse:collapse;width:100%;margin:8px 0}
.col-en td,.col-zh td,.col-en th,.col-zh th{border:1px solid var(--border);padding:4px 8px;font-size:.875rem}

.warn{padding:8px 16px;margin:16px 0;background:rgba(229,72,77,.08);border-radius:6px;color:#e5484d;font-size:.8rem}

body.lang-zh .col-en{display:none}
body.lang-zh .col-zh{flex:1 1 auto}
body.lang-en .col-zh{display:none}
body.lang-en .col-en{flex:1 1 auto}

@media(max-width:768px){
  body{padding:24px 16px}
  .pair{flex-direction:column;gap:6px}
  .col-zh{border-top:1px solid var(--border);padding-top:8px}
  .section-header{margin:32px 0 12px;padding-top:32px}
}
</style>
</head>
<body>

<div class="toolbar">
  <button id="swapBtn">⇄ 英中互换</button>
  <button id="darkBtn">🌙 关灯</button>
  <button id="langBtn">📖 双语</button>
  <a href="../index.html">← 索引</a>
</div>

<h1>{{TITLE}}</h1>
<p class="author">{{AUTHOR}}</p>

<div id="content"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
marked.setOptions({breaks:true,gfm:true});

var EN_MD = {{EN_MD_JSON}};
var ZH_MD = {{ZH_MD_JSON}};

function splitBlocks(md){
  return md.split(/\n\n+/).filter(function(b){return b.trim()});
}

var enBlocks = splitBlocks(EN_MD);
var zhBlocks = splitBlocks(ZH_MD);
var len = Math.min(enBlocks.length, zhBlocks.length);
var content = document.getElementById('content');
var activeIdx = -1;

if(enBlocks.length !== zhBlocks.length){
  var w = document.createElement('div');
  w.className = 'warn';
  w.textContent = '⚠ 段落数不匹配：EN ' + enBlocks.length + ' / ZH ' + zhBlocks.length + '（已配对的 ' + len + ' 段正常显示，超出部分见页面底部）';
  content.appendChild(w);
}

for(var i=0;i<len;i++){
  var enHTML = marked.parse(enBlocks[i]);
  var zhHTML = marked.parse(zhBlocks[i]);
  var isHeader = /^\s*<h[1-6]/.test(enHTML) || /^\s*<h[1-6]/.test(zhHTML);

  if(isHeader){
    var h = document.createElement('div');
    h.className = 'section-header';
    h.innerHTML = enHTML + ' / ' + zhHTML;
    content.appendChild(h);
  }else{
    var pair = document.createElement('div');
    pair.className = 'pair';
    pair.dataset.idx = i;
    var ec = document.createElement('div');ec.className = 'col-en';ec.innerHTML = enHTML;
    var zc = document.createElement('div');zc.className = 'col-zh';zc.innerHTML = zhHTML;
    pair.appendChild(zc);
    pair.appendChild(ec);
    content.appendChild(pair);
  }
}

// Unpaired blocks
for(var j=len;j<enBlocks.length;j++){
  var d = document.createElement('div');d.className='col-en';d.style.padding='8px 0';d.innerHTML=marked.parse(enBlocks[j]);content.appendChild(d);
}
for(var j=len;j<zhBlocks.length;j++){
  var d = document.createElement('div');d.className='col-zh';d.style.padding='8px 0';d.innerHTML=marked.parse(zhBlocks[j]);content.appendChild(d);
}

// Click highlight
content.addEventListener('click',function(e){
  var pair = e.target.closest('.pair');
  if(!pair) return;
  var prev = document.querySelector('.pair.active');
  if(prev) prev.classList.remove('active');
  var idx = pair.dataset.idx;
  if(String(activeIdx)===idx){activeIdx=-1;return}
  pair.classList.add('active');
  activeIdx = parseInt(idx);
  pair.scrollIntoView({behavior:'smooth',block:'center'});
});

// Keyboard
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    var prev = document.querySelector('.pair.active');
    if(prev) prev.classList.remove('active');
    activeIdx=-1;
  }
});

// Swap
var swapped=false;
document.getElementById('swapBtn').onclick=function(){
  swapped=!swapped;
  document.querySelectorAll('.pair').forEach(function(p){
    p.style.flexDirection = swapped ? 'row-reverse' : '';
  });
};

// Dark
var dark=localStorage.getItem('dark')==='1';
var darkBtn=document.getElementById('darkBtn');
function setDark(on){
  dark=on;
  document.body.classList.toggle('dark',on);
  darkBtn.textContent = on ? '☀️ 开灯' : '🌙 关灯';
  localStorage.setItem('dark',on?'1':'0');
}
if(dark) setDark(true);
darkBtn.onclick=function(){setDark(!dark)};

// Lang
var langIdx=0;
document.getElementById('langBtn').onclick=function(){
  langIdx=(langIdx+1)%3;
  document.body.classList.remove('lang-zh','lang-en');
  if(langIdx===1) document.body.classList.add('lang-zh');
  if(langIdx===2) document.body.classList.add('lang-en');
  this.textContent = ['📖 双语','🇨🇳 中文','🇬🇧 English'][langIdx];
  document.getElementById('swapBtn').style.display = langIdx===0 ? '' : 'none';
};
</script>
</body>
</html>
