<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How to Fix Your Entire Life in 1 Day · 一日重启协议</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    --bg: #ffffff;
    --bg-elevated: #ffffff;
    --border: #e5e5e7;
    --text-primary: #1a1a2e;
    --text-secondary: #52525b;
    --text-tertiary: #a1a1aa;
    --accent: #4f46e5;
    --accent-glow: rgba(79,70,229,0.08);
    --highlight-bg: rgba(79,70,229,0.06);
    --font-en: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --font-zh: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  }

  body.dark{
    --bg: #0f0f13;
    --bg-elevated: #1a1a24;
    --border: #2a2a35;
    --text-primary: #e4e4ec;
    --text-secondary: #9898a8;
    --text-tertiary: #5c5c6e;
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.1);
    --highlight-bg: rgba(129,140,248,0.08);
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  html{font-size:16px}

  body{
    background:var(--bg);
    color:var(--text-primary);
    font-family:var(--font-en);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .header{
    width:100%;
    max-width:960px;
    padding:64px 32px 48px;
  }

  .header h1{
    font-size:1.5rem;
    font-weight:600;
    color:var(--text-primary);
    letter-spacing:-0.02em;
    line-height:1.4;
    margin-bottom:8px;
  }

  .header .author{
    font-size:0.8125rem;
    color:var(--text-tertiary);
    font-weight:400;
  }

  .swap-btn{
    margin-top:12px;
    padding:6px 16px;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--bg-elevated);
    color:var(--accent);
    font-size:0.8rem;
    font-family:inherit;
    cursor:pointer;
    transition:all 0.15s;
  }
  .swap-btn:hover,.dark-btn:hover,.lang-btn:hover{background:var(--highlight-bg);border-color:var(--accent)}

  .dark-btn,.lang-btn{
    margin-top:8px;
    padding:6px 16px;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--bg-elevated);
    color:var(--accent);
    font-size:0.8rem;
    font-family:inherit;
    cursor:pointer;
    transition:all 0.15s;
  }

  body.lang-zh .col.en{display:none}
  body.lang-zh .col.zh{flex:1 1 auto}
  body.lang-en .col.zh{display:none}
  body.lang-en .col.en{flex:1 1 auto}

  .main{
    width:100%;
    max-width:960px;
    padding:0 32px 120px;
  }

  .section{margin-bottom:56px}

  .section-title{
    text-align:center;
    font-size:0.9375rem;
    font-weight:600;
    letter-spacing:0.02em;
    background:linear-gradient(135deg,#5e6ad2 0%,#a78bfa 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    margin:0 0 28px;
    padding-top:8px;
  }

  .section+.section .section-title{
    border-top:1px solid var(--border);
    padding-top:48px;
  }

  .pair{
    display:flex;
    gap:24px;
    align-items:flex-start;
    padding:8px 12px;
    margin:0 -12px;
    border-radius:6px;
    cursor:pointer;
    border-left:2px solid transparent;
    transition:background 0.15s ease,border-color 0.15s ease;
  }

  .pair:hover{background:var(--highlight-bg)}

  .pair.active{
    background:var(--highlight-bg);
    border-left-color:var(--accent);
  }

  .pair+.pair{margin-top:6px;padding-top:8px;border-top:1px solid var(--border)}

  .col.en{flex:0 0 50%;min-width:0;font-family:var(--font-en)}
  .col.zh{flex:0 0 50%;min-width:0;font-family:var(--font-zh)}

  body.swapped .col.en{order:1}
  body.swapped .col.zh{order:2}

  .line{
    font-size:16px;
    line-height:1.65;
    color:var(--text-secondary);
    transition:color 0.15s ease;
    margin:0;
  }
  .pair.active .line{color:var(--text-primary)}

  .line code{font-size:0.875em;background:var(--highlight-bg);padding:2px 5px;border-radius:3px;font-family:'SF Mono','Fira Code',monospace}
  .line pre{background:var(--highlight-bg);padding:12px 16px;border-radius:6px;overflow-x:auto;margin:8px 0;font-size:0.8125rem}
  .line pre code{background:none;padding:0;border-radius:0}
  .line strong{color:var(--text-primary)}
  .line blockquote,.line .quote{border-left:2px solid var(--accent);padding-left:12px;margin:6px 0;color:var(--text-tertiary);font-style:italic;display:block}
  .line .subhead{display:block;margin-top:12px;font-size:0.9375rem}
  .line em{font-style:italic}

  .loading,.error{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:80px 0;
    font-size:0.875rem;
  }

  .loading{color:var(--text-tertiary)}
  .error{color:#e5484d}

  @media(max-width:768px){
    .header{padding:40px 20px 32px}
    .header h1{font-size:1.25rem}
    .main{padding:0 20px 80px}
    .section{margin-bottom:40px}

    .pair{
      flex-direction:column;
      gap:4px;
      padding:12px;
    }

    .col.zh{
      border-top:1px solid var(--border);
      padding-top:8px;
    }

    .section+.section .section-title{padding-top:36px}
  }

  body.swapped .pair .col.en{order:1}
  body.swapped .pair .col.zh{order:2;border-top:none;padding-top:0}

  @media(min-width:1200px){
    .header,.main{max-width:1040px}
  }
</style>
</head>
<body>

<header class="header">
  <h1></h1>
  <div class="author"></div>
  <button class="swap-btn" id="swapBtn" title="切换左右顺序">⇄ 英中互换</button>
  <button class="dark-btn" id="darkBtn" title="关灯/开灯">🌙 关灯</button>
  <button class="lang-btn" id="langBtn" title="切换语言">📖 双语</button>
</header>

<main class="main">
  <div class="loading">Loading...</div>
</main>

<script type="module">
var main=document.querySelector('.main');
var titleEl=document.querySelector('.header h1');
var authorEl=document.querySelector('.header .author');

var activePairId=null;

function createPairEl(pairId,enText,zhText){
  var pair=document.createElement('div');
  pair.className='pair';
  pair.dataset.pairId=pairId;

  var zhCol=document.createElement('div');
  zhCol.className='col zh';
  var zhP=document.createElement('p');
  zhP.className='line';
  zhP.innerHTML=zhText;
  zhCol.appendChild(zhP);

  var enCol=document.createElement('div');
  enCol.className='col en';
  var enP=document.createElement('p');
  enP.className='line';
  enP.innerHTML=enText;
  enCol.appendChild(enP);

  pair.appendChild(zhCol);
  pair.appendChild(enCol);
  return pair;
}

function renderAll(data){
  var fragment=document.createDocumentFragment();

  for(var s=0;s<data.sections.length;s++){
    var section=data.sections[s];
    var secEl=document.createElement('section');
    secEl.className='section';

    var heading=document.createElement('h2');
    heading.className='section-title';
    heading.textContent=section.title;
    secEl.appendChild(heading);

    for(var i=0;i<section.pairs.length;i++){
      var pairId=section.id+'-'+i;
      secEl.appendChild(createPairEl(pairId,section.pairs[i].en,section.pairs[i].zh));
    }

    fragment.appendChild(secEl);
  }

  while(main.firstChild)main.removeChild(main.firstChild);
  main.appendChild(fragment);
}

function toggleHighlight(pairId){
  if(activePairId){
    var prev=document.querySelector('.pair[data-pair-id="'+activePairId+'"]');
    if(prev)prev.classList.remove('active');
  }

  if(activePairId===pairId){
    activePairId=null;
    return;
  }

  var curr=document.querySelector('.pair[data-pair-id="'+pairId+'"]');
  if(curr)curr.classList.add('active');
  activePairId=pairId;
}

main.addEventListener('click',function(e){
  var pair=e.target.closest('.pair');
  if(!pair)return;
  toggleHighlight(pair.dataset.pairId);
});

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'&&activePairId){
    var prev=document.querySelector('.pair[data-pair-id="'+activePairId+'"]');
    if(prev)prev.classList.remove('active');
    activePairId=null;
  }
});

var swapped=false;
document.getElementById('swapBtn').addEventListener('click',function(){
  swapped=!swapped;
  document.body.classList.toggle('swapped',swapped);
});

var darkBtn=document.getElementById('darkBtn');
var isDark=localStorage.getItem('dark')==='1';
function setDark(on){
  isDark=on;
  document.body.classList.toggle('dark',on);
  darkBtn.innerHTML=on?'☀️ 开灯':'🌙 关灯';
  localStorage.setItem('dark',on?'1':'0');
}
if(isDark)setDark(true);
darkBtn.addEventListener('click',function(){setDark(!isDark);});

var langBtn=document.getElementById('langBtn');
var langs=['','zh','en']; // ''=双语, 'zh'=仅中文, 'en'=仅英文
var langIdx=0;
function setLang(idx){
  langIdx=idx;
  var cls=langs[idx];
  document.body.classList.remove('lang-zh','lang-en');
  if(cls)document.body.classList.add('lang-'+cls);
  langBtn.innerHTML=idx===0?'📖 双语':idx===1?'🇨🇳 中文':'🇬🇧 English';
  document.getElementById('swapBtn').style.display=idx===0?'':'none';
}
langBtn.addEventListener('click',function(){setLang((langIdx+1)%3);});

          "en": "<strong>LSH</strong> (Locality-Sensitive Hashing): It introduces a hashing function such that similar input items are mapped to the same buckets with high probability, where the number of buckets is much smaller than the number of inputs.<br><strong>ANNOY</strong> (Approximate Nearest Neighbors Oh Yeah): The core data structure are random projection trees, a set of binary trees where each non-leaf node represents a hyperplane splitting the input space into half and each leaf stores one data point. Trees are built independently and at random. ANNOY search happens in all the trees to iteratively search through the half that is closest to the query and then aggregates the results.<br><strong>HNSW</strong> (Hierarchical Navigable Small World): It is inspired by the idea of small world networks. HNSW builds hierarchical layers of small-world graphs, where the bottom layers contain the actual data points. The layers in the middle create shortcuts to speed up search. When performing a search, HNSW starts from a random node in the top layer and navigates towards the target, moving down to the next layer when it cannot get any closer.<br><strong>FAISS</strong> (Facebook AI Similarity Search): It operates on the assumption that in high dimensional space, distances between nodes follow a Gaussian distribution and thus there should exist clustering of data points. FAISS applies vector quantization by partitioning the vector space into clusters and then refining the quantization within clusters.<br><strong>ScaNN</strong> (Scalable Nearest Neighbors): The main innovation in ScaNN is anisotropic vector quantization. It quantizes a data point such that the inner product is as similar to the original distance as possible, instead of picking the closest quantization centroid points.",
          "zh": "• <strong>LSH</strong>（Locality-Sensitive Hashing，局部敏感哈希）：通过哈希将相似输入映射到同一桶。<br>• <strong>ANNOY</strong>（Approximate Nearest Neighbors Oh Yeah）：使用随机投影树。每棵树用超平面切分输入空间；搜索在所有树中遍历最近半区并聚合结果。<br>• <strong>HNSW</strong>（Hierarchical Navigable Small World，分层可导航小世界）：构建分层小世界图，在层间创建搜索捷径。搜索从顶层开始向下导航。<br>• <strong>FAISS</strong>（Facebook AI Similarity Search，Facebook AI 相似性搜索）：假设距离服从高斯分布，应用向量量化进行粗聚类后再细聚类。<br>• <strong>ScaNN</strong>（Scalable Nearest Neighbors，可扩展最近邻）：使用各向异性向量量化来保持内积相似性。"
        }
      ]

        {
          "en": "<strong>MRKL</strong> (Karpas et al. 2022), short for \"Modular Reasoning, Knowledge and Language\", is a neuro-symbolic architecture for autonomous agents. A MRKL system is proposed to contain a collection of \"expert\" modules and the general-purpose LLM works as a router to route inquiries to the best suitable expert module. These modules can be neural (e.g. deep learning models) or symbolic (e.g. math calculator, currency converter, weather API). Their experiments showed that it was harder to solve verbal math problems than explicitly stated math problems because LLMs failed to extract the right arguments for the basic arithmetic reliably. The results highlight that when the external symbolic tools can work reliably, knowing <em>when to and how to use the tools</em> are crucial, determined by the LLM capability.",
          "zh": "<strong>MRKL</strong>（Modular Reasoning, Knowledge and Language，模块化推理、知识与语言）是一种神经-符号架构，通用 LLM 将查询路由给专家模块（可以是神经网络或符号模块，如计算器、天气 API）。实验表明，LLM 在提取基础算术的参数方面存在困难，凸显了知道<em>何时以及如何使用工具</em>的关键性。"

          "zh": "<strong>TALM</strong> 和 <strong>Toolformer</strong> 对 LM 进行微调以使用外部工具 API，根据 API 调用标注是否提升了输出质量来扩展训练数据集。"

          "en": "<strong>HuggingGPT</strong> (Shen et al. 2023) is a framework to use ChatGPT as the task planner to select models available in HuggingFace platform according to the model descriptions and summarize the response based on the execution results. The system comprises of 4 stages: <br>(1) <strong>Task planning</strong>: LLM works as the brain and parses the user requests into multiple tasks with task type, ID, dependencies, and arguments. <br>(2) <strong>Model selection</strong>: LLM distributes the tasks to expert models, where the request is framed as a multiple-choice question. <br>(3) <strong>Task execution</strong>: Expert models execute on the specific tasks and log results. <br>(4) <strong>Response generation</strong>: LLM receives the execution results and provides summarized results to users.",

        {

          "en": "<strong>API-Bank</strong> (Li et al. 2023) is a benchmark for evaluating the performance of tool-augmented LLMs. It contains 53 commonly used API tools, a complete tool-augmented LLM workflow, and 264 annotated dialogues that involve 568 API calls. The selection of APIs is quite diverse, including search engines, calculator, calendar queries, smart home control, schedule management, health data management, account authentication workflow and more. This benchmark evaluates the agent's tool use capabilities at three levels: <br>• <strong>Level-1</strong> evaluates the ability to call the API given its description. <br>• <strong>Level-2</strong> examines the ability to retrieve the API by searching and learning from documentation. <br>• <strong>Level-3</strong> assesses the ability to plan API beyond retrieve and call, handling unclear user requests with multiple API calls.",

          "en": "<strong>ChemCrow</strong> (Bran et al. 2023) is a domain-specific example in which LLM is augmented with 13 expert-designed tools to accomplish tasks across organic synthesis, drug discovery, and materials design. The workflow, implemented in LangChain, reflects what was previously described in the ReAct and MRKLs and combines CoT reasoning with tools relevant to the tasks. <br>The LLM is provided with a list of tool names, descriptions of their utility, and details about the expected input/output. <br>It is then instructed to answer a user-given prompt using the tools provided when necessary, following the ReAct format - Thought, Action, Action Input, Observation. One interesting observation is that while the LLM-based evaluation concluded that GPT-4 and ChemCrow perform nearly equivalently, human evaluations with experts showed that ChemCrow outperforms GPT-4 by a large margin. This indicates a potential problem with using LLM to evaluate its own performance on domains that require deep expertise.",

          "en": "<strong>Memory stream</strong>: is a long-term memory module (external database) that records a comprehensive list of agents' experience in natural language. Each element is an observation, an event directly provided by the agent. Inter-agent communication can trigger new natural language statements.<br><strong>Retrieval model</strong>: surfaces the context to inform the agent's behavior, according to relevance, recency and importance. Recency: recent events have higher scores. Importance: distinguish mundane from core memories, ask LM directly. Relevance: based on how related it is to the current situation / query.<br><strong>Reflection mechanism</strong>: synthesizes memories into higher level inferences over time and guides the agent's future behavior. They are higher-level summaries of past events. Prompt LM with 100 most recent observations and to generate 3 most salient high-level questions, then ask LM to answer those questions.<br><strong>Planning & Reacting</strong>: translate the reflections and the environment information into actions. Planning is essentially in order to optimize believability at the moment vs in time. Relationships between agents and observations of one agent by another are all taken into consideration for planning and reacting.",
