var EN_MD = "# How to Fix Your Entire Life in 1 Day\n\n**Author: Dan Koe (@thedankoe)**\n\n## Introduction: Why You'll Quit Your New Year's Resolution\n\nNew Year's resolutions fail at 80-90% rate because most people don't genuinely want to change on a deep level. They set resolutions to follow the crowd — humans care more about impressing others than pleasing themselves. They never satisfy the conditions needed for real change.\n\n> Human nature is a bitch, and the worst feeling is when you make a promise to yourself and can't help but break it.\n\n## Part I: You Haven't Become That Person Yet\n\n> You aren't where you want to be because you aren't the person who would be there.\n\nTwo components of change:\n1. **Changing your actions** — secondary, second-order\n2. **Changing who you are** — primary, first-principles\n\nMost people set surface-level goals, rely on willpower for a few weeks, then return to old patterns. They're \"building a beautiful house on a rotting foundation.\"\n\nA bodybuilder doesn't need willpower to eat healthy. A CEO doesn't need discipline to wake up and lead — they *can't imagine living any other way*.\n\n> If you want a specific outcome in life, you must have the lifestyle that creates that outcome long before you reach it.\n\nWhen you truly change, old habits become *disgusting* — because you know exactly where they lead.\n\n## Part II: You Don't Actually Want To Go There\n\nAlfred Adler's **Teleology**: All behavior is goal-oriented, even when unconscious.\n\n> Trust only movement. Life happens at the level of events, not of words. — Alfred Adler\n\nYou procrastinate on writing not because you're lazy — but because your subconscious goal is to **protect yourself from the judgment that comes with finishing and publishing your work**.\n\n> Real change, at its core, is about changing your subconscious goals.\n\n## Part III: You're Afraid of Becoming Who You Want To Be\n\n### The Identity Loop (8 steps)\n\n1. You set a goal\n2. Perceive reality through its lens\n3. Notice only helpful information\n4. Act and receive feedback\n5. Behavior becomes automatic\n6. It merges into identity (\"I'm the kind of person who...\")\n7. **You DEFEND that identity**\n8. Identity shapes new goals — the loop restarts\n\nWhen your identity is threatened, your body reacts the same as to a physical threat — **fight or flight**.\n\n## Part IV: The Life You Want Lives at a Specific Level of Consciousness\n\n**9 Levels of Self-Development:**\n\n1. **Impulsive** — Acts on impulse, black-and-white thinking\n2. **Self-Protective** — World is dangerous, everything must favor self\n3. **Conformist** — You ARE your group, group rules = truth\n4. **Self-Aware** — Inner world and outer expression don't match\n5. **Principled** — Build your own principle system\n6. **Individualistic** — Realize your principles are shaped by environment\n7. **Strategic** — Observe systems, knowing you're part of them\n8. **Construct-Aware** — \"The map is not the territory.\" All frameworks are useful fictions.\n9. **Unitive** — Boundaries between self and life dissolve.\n\n## Part V: Intelligence Is Getting What You Want\n\n> The only real test of intelligence is if you get what you want out of life. — Naval Ravikant\n\n**Cybernetics** — from Greek *kybernetikos*, meaning \"the art of steering\":\n1. Set a goal, act toward it\n2. Sense current position, compare to goal\n3. Adjust action based on feedback\n\n> Given a large enough timescale, any problem can be solved.\n\n## Part VI: The One-Day Reset Protocol\n\n### Morning: Psychological Excavation\n\n**Q1:** Describe the vague, lingering dissatisfaction you've learned to live with.\n\n**Q2:** What do you complain about repeatedly but never change?\n\n**Q3:** What truth about your current life are you terrified to tell someone you deeply respect?\n\n**Q4 (Anti-Vision):** Describe an ordinary Tuesday 5 years from now if nothing changes.\n\n**Q5:** Same description for 10 years: Which opportunities have closed? Who has given up on you?\n\n**Q6:** At the end of your life — you lived the \"safe version.\" What was the cost?\n\n**Q7 (Minimum Viable Vision):** Set aside feasibility. If you could snap your fingers and live a different life in 3 years, what would it look like?\n\n**Q8:** Write your identity statement: \"I am the kind of person who...\"\n\n### Daytime: Interrupt Autopilot\n\nSet phone alarms:\n- **11:00 AM** — What am I avoiding right now?\n- **1:30 PM** — If someone recorded my last 2 hours, what would they say I truly want?\n- **3:15 PM** — Am I walking toward the life I dread or the life I desire?\n- **5:00 PM** — What am I pretending isn't important when it actually matters most?\n- **7:30 PM** — What did I do today to protect an old identity?\n- **9:00 PM** — When today was I most alive? When was I most numb?\n\n### Evening: Integration\n\n1. What's the **real reason** I'm stuck?\n2. What's the real **enemy**? (Name that inner pattern/belief)\n3. **One-sentence Anti-Vision**: What will I NOT let my life become?\n4. **One-sentence Minimum Viable Vision**: What am I building?\n5. **1-Year Goal**: What specific outcome proves you broke the old pattern?\n6. **1-Month Project**: What keeps the yearly goal possible?\n7. **Daily Leverage**: 2-3 actions to lock in tomorrow.\n\n## Part VII: Turn Your Life Into a Game\n\n**6 Gamification Elements:**\n\n- Victory Condition → **Vision**\n- Failure Penalty → **Anti-Vision**\n- Main Quest → **1-Year Goal**\n- Boss Fight → **1-Month Project**\n- Daily Quests → **Daily Leverage Actions**\n- Game Rules → **Non-Negotiable Constraints**\n\n> Goals are not endpoints — they are a cognitive lens. Happiness and satisfaction lie in the process of continuous progress.\n\n## Key Quotes\n\n> You aren't where you want to be because you aren't the person who would be there.\n\n> If you want a specific outcome in life, you must have the lifestyle that creates that outcome long before you reach it.\n\n> Trust only movement. Life happens at the level of events, not of words.\n\n> Real change, at its core, is about changing your subconscious goals.\n\n> The only real test of intelligence is if you get what you want out of life.\n";
var ZH_MD = "---\ntitle: 如何在一天之内修复你的人生\nsource_url: https://x.com/thedankoe\nsource_author: Dan Koe\nsource_platform: X (Twitter)\nlanguage: en → zh-CN\nsaved: 2026-05-27\nnotes: 2026年初马斯克X平台百万美金优质长文悬赏季军，阅读量超1.7亿\n---\n\n# How to Fix Your Entire Life in 1 Day / 如何在一天之内修复你的人生\n\n**作者：Dan Koe (@thedankoe)**\n**背景：** Elon Musk 在 X 平台发起百万美元最佳长文悬赏活动，此文阅读量突破 1.73 亿，获季军及 25 万美元特别奖。\n\n---\n\n## 引言：为什么你会放弃新年决心\n\n新年决心的失败率高达 80-90%，因为大多数人并非发自内心深处渴望改变。他们立下新年决心，不过是随波逐流——人类总是更在意给他人留下好印象，而非取悦自己。我们在追逐地位的游戏中，为生活赋予了一种流于表面的意义——但他们从未满足真正改变所需的条件。\n\n人性本就复杂难缠，而最糟糕的感受，莫过于向自己许下承诺，却身不由己地违背它。你会开始感到无助，若始终不得其法，这种循环可能会持续数年：一直渴望改变，却永远无法迈出实质性的一步。\n\n---\n\n## Part I：你尚未成为那个人\n\n> \"You aren't where you want to be because you aren't the person who would be there.\"\n> 你到不了想去的地方，因为你还不是能站在那里的人。\n\n改变的两个组成部分：\n1. **改变行为** — 次要的，第二层级的\n2. **改变你是谁** — 首要的，第一性原理\n\n大多数人只是设定表层目标，靠意志力撑几周，然后回到旧模式。他们是在\"腐烂的地基上建漂亮房子\"。\n\n健美选手不需要意志力吃健康餐，CEO 不需要自律才能起床领导——他们\"无法想象以其他方式生活\"。\n\n> \"If you want a specific outcome in life, you must have the lifestyle that creates that outcome long before you reach it.\"\n> 若你渴望某种人生结果，必须在达成之前就过上能催生该结果的生活方式。\n\n当你真的变了，旧习惯会变得\"令你厌恶\"，因为你深刻地知道它们通向何处。\n\n---\n\n## Part II：你并非真正想去那里\n\n引用阿尔弗雷德·阿德勒的\"目的论\"（Teleology）：**所有行为都是目标导向的**，即使你意识不到。\n\n> \"Trust only movement. Life happens at the level of events, not of words.\" — Alfred Adler\n> \"只相信行动。生活发生在事件的层面，而非言语的层面。\"\n\n你拖延写作，不是因为你懒——而是因为你的潜意识目标可能是\"保护自己免受完成和发表作品带来的评判\"。你不是不想成功，你只是更想避免失败。\n\n> \"Real change, at its core, is about changing your subconscious goals.\"\n> \"真正的改变，其核心在于改变你潜意识里的目标。\"\n\n---\n\n## Part III：你害怕成为你想成为的人\n\n**身份认同的解剖图谱（8步循环）：**\n\n1. 你设定一个目标\n2. 你通过目标的滤镜感知现实\n3. 你只注意到有助于实现目标的信息（学习）\n4. 你采取行动并接收反馈（强化）\n5. 行为变为自动（条件反射）\n6. 行为融入自我身份（\"我就是那种会……的人\"）\n7. **你捍卫这个身份以维持心理一致性**\n8. 身份塑造新的目标——循环重新开始\n\n关键在第 6-7 步之间打破循环。当你的身份受到威胁时，你的反应和面对物理威胁一样——\"战或逃\"。\n\n---\n\n## Part IV：你想要的生活藏在心智的特定层级里\n\n**自我发展的九个层级：**\n\n| 层级 | 名称 | 特征 |\n|------|------|------|\n| 1 | 冲动型 | 凭冲动行动，非黑即白思维 |\n| 2 | 自我保护型 | 世界是危险的，一切都必须对自己有利 |\n| 3 | 从众型 | 你就是你的群体，群体规则即真理 |\n| 4 | 自我觉察型 | 内心世界与外部表达不匹配 |\n| 5 | 原则型 | 建立自己的原则体系 |\n| 6 | 个人主义型 | 意识到自己的原则受环境塑造 |\n| 7 | 战略型 | 观察系统，同时知道自己也是系统的一部分 |\n| 8 | 建构觉察型 | \"地图不等于领土\"，所有框架都是有用的\"虚构\" |\n| 9 | 合一型 | 自我与生命的边界消融 |\n\n---\n\n## Part V：智慧是获得你想要之物的能力\n\n> \"The only real test of intelligence is if you get what you want out of life.\" — Naval Ravikant\n> \"衡量一个人是否真正聪明的唯一标准，就是看他能不能搞到自己想要的人生。\"\n\n**控制论（Cybernetics）**——源自希腊语 \"kybernetikos\"，意为\"掌舵的艺术\"：\n\n1. 设定目标，朝目标行动\n2. 感知当前位置，与目标比较\n3. 基于反馈调整行动\n\n高智能 = 迭代、坚持、看清全局的能力。低智能 = 无法从错误中学习。\n\n> \"Given a large enough timescale, any problem can be solved.\"\n> \"只要时间尺度足够大，任何问题都能解决。\"\n\n---\n\n## Part VI：一日重启协议（核心实操 🔥）\n\n### 上午：心理挖掘\n\n回答以下问题（手写）：\n\n**Q1:** 那种你已经学会忍受的、平淡却挥之不去的不满是什么？\n\n**Q2:** 你反复抱怨却从不改变的是什么？对每个抱怨——一个只看你行动、不听你言语的观察者，会说你真正想要什么？\n\n**Q3:** 关于你当前的生活，有什么真相是你害怕告诉一个你深深敬重的人的？\n\n**Q4 (反愿景):** 如果 5 年什么都不变，描述一个普通的周二：在哪里醒来？感觉如何？第一个念头是什么？身边有谁？9 点到 6 点在做什么？晚上 10 点感受如何？\n\n**Q5:** 10 年后同样的描述：哪些机会已经关闭？谁已经放弃了你？你不在场时别人怎么评价你？\n\n**Q6:** 生命结束时——你活的是\"安全版本\"。代价是什么？你压抑了什么感受？\n\n**Q7 (最小可行愿景):** 抛开可行性。如果你能打个响指在 3 年后过上另一种生活，那会是什么样？详细描述一个周二。\n\n**Q8:** 写下你的身份宣言：\"我是那种会……的人。\"那种人\"本周会做的一件事是什么？\n\n### 白天：打断自动驾驶\n\n设置手机闹钟：\n\n- **11:00 AM:** 我此刻在做的事是在逃避什么？\n- **1:30 PM:** 如果有人录下我过去 2 小时，他们会说我真的想要什么？\n- **3:15 PM:** 我在走向我讨厌的人生，还是我渴望的人生？\n- **5:00 PM:** 我在假装什么不重要，而实际上它最重要？\n- **7:30 PM:** 今天做了什么是为了保护旧身份，而非出于真正的渴望？\n- **9:00 PM:** 今天什么时候最有活力？什么时候最麻木？\n\n### 晚上：整合\n\n1. 我停滞不前的真正原因是什么？\n2. 真正的\"敌人\"是什么？（命名那个内在的模式/信念）\n3. 一句话反愿景：我绝不让我的人生变成什么\n4. 一句话最小可行愿景：我正在建设什么\n5. **1 年目标**：什么具体的事能证明你打破了旧模式？\n6. **1 月项目**：什么能让年度目标保持可能？\n7. **每日杠杆**：明天可以锁定的 2-3 个行动是什么？\n\n---\n\n## Part VII：把人生变成一场游戏\n\n**六个游戏化要素：**\n\n| 游戏要素 | 人生对应 | 功能 |\n|---------|---------|------|\n| 胜利条件 | 愿景 Vision | 提供方向和长期动力 |\n| 失败惩罚 | 反愿景 Anti-Vision | 激活对退回糟糕状态的恐惧 |\n| 主线任务 | 1 年目标 | 单一核心优先事项 |\n| Boss战 | 1 月项目 | 关键经验值和成就里程碑 |\n| 每日任务 | 每日杠杆 | 解锁新机会的日常行动 |\n| 游戏规则 | 约束条件 | 绝不牺牲的底线 |\n\n> \"Goals are not endpoints — they are a cognitive lens. Happiness and satisfaction lie in the process of continuous progress.\"\n> \"目标并非为了'达成'而设定——它是一种认知透镜。快乐与满足，藏在不断进步的过程中。\"\n\n---\n\n## 核心金句\n\n- \"You aren't where you want to be because you aren't the person who would be there.\" — 你到不了想去的地方，因为你还不是能站在那里的人。\n- \"If you want a specific outcome in life, you must have the lifestyle that creates that outcome long before you reach it.\" — 若你渴望某种人生结果，必须在达成之前就过上能催生该结果的生活方式。\n- \"Trust only movement. Life happens at the level of events, not of words.\" — 只相信行动。生活发生在事件的层面，而非言语的层面。\n- \"The only real test of intelligence is if you get what you want out of life.\" — 衡量聪明的唯一标准，是你能不能搞到自己想要的人生。\n\n---\n\n## 来源\n\n- 英文原文：Dan Koe @thedankoe on X\n- [澎湃新闻：上亿阅读量的爆款文章到底说了什么](https://www.thepaper.cn/newsDetail_forward_32652540)\n- [163.com：马斯克悬赏100万美金近2亿阅读量的网络爆文](https://m.163.com/dy/article/KMABB7FM055350NS.html)\n- [CSDN：How to Fix Your Entire Life in 1 Day 完整中译版](https://blog.csdn.net/wozhendeyumenle/article/details/159002868)\n- [CSDN：How to fix your entire life in 1 day 原文](https://blog.csdn.net/darkhorsefly/article/details/159561761)\n- [微信公众平台：中英对照 1.7亿爆文](http://mp.weixin.qq.com/s?__biz=Mzg3NzQzNDczMg==&mid=2247483733&idx=3&sn=65432b00f216994779c1ec543479990b)\n";

function splitBlocks(md){
  return md.split(/\n\n+/).filter(function(b){return b.trim()});
}

var enBlocks = splitBlocks(EN_MD);
var zhBlocks = splitBlocks(ZH_MD);
var len = Math.min(enBlocks.length, zhBlocks.length);
var content = document.getElementById('content');
var activeIdx = -1;

if(enBlocks.length !== zhBlocks.length){

for(var i=0;i<len;i++){

    var zc = document.createElement('div');zc.className = 'col-zh';zc.innerHTML = zhHTML;
    pair.appendChild(zc);
    pair.appendChild(ec);
    content.appendChild(pair);
  }
}

// Unpaired blocks
for(var j=len;j<enBlocks.length;j++){
  var d = document.createElement('div');d.className='col-en';d.style.padding='8px 0';d.innerHTML=marked.parse(enBlocks[j]);content.appendChild(d);
}
for(var j=len;j<zhBlocks.length;j++){
  var d = document.createElement('div');d.className='col-zh';d.style.padding='8px 0';d.innerHTML=marked.parse(zhBlocks[j]);content.appendChild(d);
}

// Click highlight
content.addEventListener('click',function(e){
  var pair = e.target.closest('.pair');
  if(!pair) return;
  var prev = document.querySelector('.pair.active');
  if(prev) prev.classList.remove('active');
  var idx = pair.dataset.idx;
  if(String(activeIdx)===idx){activeIdx=-1;return}
  pair.classList.add('active');
  activeIdx = parseInt(idx);
  pair.scrollIntoView({behavior:'smooth',block:'center'});
});

// Keyboard
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    var prev = document.querySelector('.pair.active');
    if(prev) prev.classList.remove('active');
    activeIdx=-1;
  }
});

// Swap
var swapped=false;
document.getElementById('swapBtn').onclick=function(){
  swapped=!swapped;
  document.querySelectorAll('.pair').forEach(function(p){
    p.style.flexDirection = swapped ? 'row-reverse' : '';
  });
};

// Dark
var dark=localStorage.getItem('dark')==='1';
var darkBtn=document.getElementById('darkBtn');
function setDark(on){
  dark=on;
  document.body.classList.toggle('dark',on);
  darkBtn.textContent = on ? '☀️ 开灯' : '🌙 关灯';
  localStorage.setItem('dark',on?'1':'0');
}
if(dark) setDark(true);
darkBtn.onclick=function(){setDark(!dark)};

// Lang
var langIdx=0;
document.getElementById('langBtn').onclick=function(){
  langIdx=(langIdx+1)%3;
  document.body.classList.remove('lang-zh','lang-en');
  if(langIdx===1) document.body.classList.add('lang-zh');
  if(langIdx===2) document.body.classList.add('lang-en');
  this.textContent = ['📖 双语','🇨🇳 中文','🇬🇧 English'][langIdx];
  document.getElementById('swapBtn').style.display = langIdx===0 ? '' : 'none';
};
</script>
</body>
</html>
